<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Records</title>
</head>
<body>
<h1 style="text-align: center; color: #0f34e9; padding: 20px; margin: 0; border: 1px solid black;">Employee Records</h1>
<table width="100%" border="2" style="text-align: center;">
    <tr style="background-color: yellow; color: black;">
        <th>ID</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Email</th>
        <th>Phone Number</th>
        <th>Job Role</th>
        <th>Salary</th>
    </tr>

    {% for x in myemployees %}
    <tr>
        <td>{{ x.id }}</td> 
        <td>{{ x.firstname }}</td>
        <td>{{ x.lastname }}</td>
        <td>{{ x.email }}</td>
        <td>{{ x.phone }}</td>
        <td>{{ x.jobrole }}</td>
        <td>{{ x.salary }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
